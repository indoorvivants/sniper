name: CI
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos_build:
    name: MacOS (${{ matrix.OS }})
    strategy:
      fail-fast: true
      matrix:
        OS: ["macos-15", "macos-15-intel"]
    runs-on: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: sbt/setup-sbt@v1

      - uses: coursier/cache-action@v6

      - name: Cache SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/sbt/v2
          key: ${{ matrix.OS }}-sbt2

      - name: Build the binary
        run: |
          sbt buildBinaryPlatformRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: out/release/*
          name: ${{ matrix.os }}-binaries
          if-no-files-found: error

  linux_build:
    name: Linux (${{ matrix.OS }})
    strategy:
      fail-fast: true
      matrix:
        OS: ["ubuntu-22.04", "ubuntu-22.04-arm"]
    runs-on: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: sbt/setup-sbt@v1

      - uses: coursier/cache-action@v6

      - name: Cache SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/sbt/v2
          key: ${{ matrix.OS }}-sbt2

      - name: Build the binary
        run: |
          sbt buildBinaryPlatformRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: out/release/*
          name: ${{ matrix.os }}-binaries
          if-no-files-found: error

  windows_build:
    name: Windows
    strategy:
      fail-fast: false
    runs-on: windows-2022
    env:
      LLVM_BIN: 'C:\Program Files\LLVM\bin'
      LLVM_VERSION: "20.1.0"
    steps:
      # This step is important to make sure scalafmt
      # checks don't fail
      - name: Setup git config
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: coursier/cache-action@v6

      - uses: sbt/setup-sbt@v1

      - name: Cache SBT
        uses: actions/cache@v5
        with:
          path: |
            %LocalAppData%\sbt\v2
          key: ${{ runner. }}-sbt2

      - name: Build the binary
        run: |
          sbt buildBinaryPlatformRelease

      # - name: Upload artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     path: out/release/*
      #     name: windows-binaries
      #     if-no-files-found: error
      #
  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: [linux_build]
    name: Publish to Maven Central
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: coursier/cache-action@v6

      - uses: VirtusLab/scala-cli-setup@main
        with:
          power: true

      - name: Publish snapshot
        if: github.ref == 'refs/heads/main'
        run: sbt ci-release
        env:
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux_build, windows_build, macos_build]
    name: Upload binaries to release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        id: download
        with:
          path: binaries

      - name: List downloaded binaries
        run: ls -R binaries

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "${{steps.download.outputs.download-path}}/**/*"

  mergify-build-checkpoint:
    runs-on: ubuntu-latest
    needs: [linux_build, windows_build, macos_build]
    steps:
      - name: I only exist to please Mergify :(
        run: echo "It's a sad existence but necessary"
